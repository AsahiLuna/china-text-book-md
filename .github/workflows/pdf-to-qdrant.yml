name: PDF to Qdrant

on:
  workflow_dispatch:
    inputs:
      pdf_path:
        description: 'PDF path in repo (e.g., 高中/数学/xxx.pdf)'
        required: true
      chunk_size:
        description: 'Chunk size in characters'
        required: false
        default: '500'

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Download PDF
        run: |
          PDF_PATH="${{ github.event.inputs.pdf_path }}"
          ENCODED=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$PDF_PATH'))")
          curl -L "https://raw.githubusercontent.com/AsahiLuna/ChinaTextbook/master/$ENCODED" -o input.pdf
          ls -lh input.pdf

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache marker models
        uses: actions/cache@v4
        with:
          path: ~/.cache/datalab
          key: marker-models-v1
          restore-keys: |
            marker-models-

      - name: Install marker
        run: pip install marker-pdf

      - name: Extract PDF
        run: |
          python -c "
          from marker.converters.pdf import PdfConverter
          from marker.models import create_model_dict
          converter = PdfConverter(artifact_dict=create_model_dict())
          rendered = converter('input.pdf')
          with open('output.md', 'w', encoding='utf-8') as f:
              f.write(rendered.markdown)
          print('Extracted to output.md')
          "

      - name: Chunk & generate Qdrant JSON
        run: |
          python -c "
          import json, re
          chunk_size = int('${{ github.event.inputs.chunk_size }}')
          text = open('output.md', 'r', encoding='utf-8').read()
          
          chunks, current = [], ''
          for para in re.split(r'\n\n+', text):
              if len(current) + len(para) < chunk_size:
                  current += para + '\n\n'
              else:
                  if current: chunks.append(current.strip())
                  current = para + '\n\n'
          if current: chunks.append(current.strip())
          
          points = [{
              'id': hash('${{ github.event.inputs.pdf_path }}' + str(i)) % 1000000000,
              'vector': [0.0] * 1536,
              'payload': {
                  'text': c,
                  'source': '${{ github.event.inputs.pdf_path }}',
                  'chunk_id': i
              }
          } for i, c in enumerate(chunks) if len(c) > 50]
          
          with open('qdrant_import.json', 'w', encoding='utf-8') as f:
              json.dump({'points': points}, f, ensure_ascii=False, indent=2)
          print(f'Generated {len(points)} chunks')
          "

      - name: Upload Qdrant JSON
        uses: actions/upload-artifact@v4
        with:
          name: qdrant-result
          path: qdrant_import.json
