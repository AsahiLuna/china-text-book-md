name: PDF to Qdrant

on:
  workflow_dispatch:
    inputs:
      pdf_path:
        description: 'PDF path (e.g., 高中/数学/湘教版-湖南教育出版社/普通高中教科书·数学必修 第一册.pdf)'
        required: true
      chunk_size:
        description: 'Chunk size in characters'
        required: false
        default: '500'

jobs:
  download:
    runs-on: ubuntu-latest
    outputs:
      pdf_name: ${{ steps.download.outputs.name }}
    steps:
      - name: Download PDF
        id: download
        run: |
          PDF_PATH="${{ github.event.inputs.pdf_path }}"
          FILENAME=$(basename "$PDF_PATH")
          echo "Downloading: $PDF_PATH"
          echo "filename=$FILENAME" >> $GITHUB_OUTPUT
          curl -L "https://raw.githubusercontent.com/AsahiLuna/ChinaTextbook/main/$(python3 -c "import urllib.parse; print(urllib.parse.quote('$PDF_PATH'))")" \
            -o "$FILENAME"
          ls -lh "$FILENAME"

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: source-pdf
          path: ${{ steps.download.outputs.name }}

  convert:
    needs: download
    runs-on: ubuntu-latest
    steps:
      - name: Download PDF
        uses: actions/download-artifact@v4
        with:
          name: source-pdf
          path: .

      - name: Get filename
        run: |
          FILENAME=$(ls *.pdf | head -1)
          echo "pdf_file=$FILENAME" >> $GITHUB_OUTPUT
          echo "Processing: $FILENAME"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install marker
        run: pip install marker-pdf

      - name: Extract PDF
        run: |
          python -c "
          from marker.converters.pdf import PdfConverter
          from marker.models import create_model_dict
          import os
          pdf_file = '${{ env.pdf_file }}'
          converter = PdfConverter(artifact_dict=create_model_dict())
          rendered = converter(pdf_file)
          md_file = pdf_file + '.md'
          with open(md_file, 'w', encoding='utf-8') as f:
              f.write(rendered.markdown)
          print(f'Extracted to: {md_file}')
          "

      - name: Chunk & generate Qdrant JSON
        run: |
          python -c "
          import json, re, os
          pdf_file = '${{ env.pdf_file }}'
          md_file = pdf_file + '.md'
          chunk_size = int('${{ github.event.inputs.chunk_size }}')
          
          text = open(md_file, 'r', encoding='utf-8').read()
          chunks, current = [], ''
          
          for para in re.split(r'\n\n+', text):
              if len(current) + len(para) < chunk_size:
                  current += para + '\n\n'
              else:
                  if current: chunks.append(current.strip())
                  current = para + '\n\n'
          if current: chunks.append(current.strip())
          
          points = [{
              'id': hash(pdf_file + str(i)) % 1000000000,
              'vector': [0.0] * 1536,
              'payload': {
                  'text': c,
                  'source': pdf_file,
                  'chunk_id': i
              }
          } for i, c in enumerate(chunks) if len(c) > 50]
          
          with open('qdrant_import.json', 'w', encoding='utf-8') as f:
              json.dump({'points': points}, f, ensure_ascii=False, indent=2)
          print(f'Generated {len(points)} chunks')
          "

      - name: Upload Qdrant JSON
        uses: actions/upload-artifact@v4
        with:
          name: qdrant-result
          path: qdrant_import.json
